# ─────────────────────────────────────────────────────────────────────────────
# upstream.yaml — Human Skills Upstream Repository Tracker
#
# Use {REPO_ROOT} as a portable placeholder for the root of this repo.
# The sync script resolves it automatically — no hardcoded paths needed.
#
# Format:
#   name  : A short label shown in logs
#   path  : Absolute local path to the cloned upstream repo
# ─────────────────────────────────────────────────────────────────────────────

upstreams:

  - name: claude-skills
    path: "{REPO_ROOT}/.claude-skills"
    url: "https://github.com/alirezarezvani/claude-skills.git"
    pull: true

  - name: everything-claude-code
    path: "{REPO_ROOT}/.everything-claude-code"
    url: "https://github.com/affaan-m/everything-claude-code.git"
    pull: true

  - name: superpowers
    path: "{REPO_ROOT}/.superpowers"
    url: "https://github.com/obra/superpowers.git"
    pull: true

  - name: ui-ux-pro-max-skill
    path: "{REPO_ROOT}/.ui-ux-pro-max-skill"
    url: "https://github.com/nextlevelbuilder/ui-ux-pro-max-skill.git"
    pull: true

  - name: chart-visualization-skills
    path: "{REPO_ROOT}/.chart-visualization-skills"
    url: "https://github.com/mdnaimul22/chart-visualization-skills.git"
    pull: true

  - name: anthropics-skills
    path: "{REPO_ROOT}/.anthropics-skills"
    url: "https://github.com/anthropics/skills.git"
    pull: true
