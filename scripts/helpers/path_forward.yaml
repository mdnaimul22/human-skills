# ─────────────────────────────────────────────────────────────────────────────
# path_forward.yaml — Skill Copy Mapping Rules
#
# Use {REPO_ROOT} as a portable placeholder for the root of this repo.
# The sync script resolves it automatically — no hardcoded paths needed.
#
# Format:
#   from    : Absolute source path (in upstream repo)
#   to      : Absolute destination path (in YOUR repo's skills/ dir)
#   enabled : Set to false to temporarily pause this forwarding rule
#
# Notes:
#   - Destination folder will be OVERWRITTEN on every sync (clean copy)
#   - Source must be a skill folder containing a SKILL.md file
#   - You can add as many rules as needed below
# ─────────────────────────────────────────────────────────────────────────────

forwards:
# anthropics-skills
  - from: "{REPO_ROOT}/.anthropics-skills/skills/docx"
    to:   "{REPO_ROOT}/skills/docx"
    enabled: true

  - from: "{REPO_ROOT}/.anthropics-skills/skills/pdf"
    to:   "{REPO_ROOT}/skills/pdf"
    enabled: true

  - from: "{REPO_ROOT}/.anthropics-skills/skills/pptx"
    to:   "{REPO_ROOT}/skills/pptx"
    enabled: true

  - from: "{REPO_ROOT}/.anthropics-skills/skills/xlsx"
    to:   "{REPO_ROOT}/skills/xlsx"
    enabled: true

  - from: "{REPO_ROOT}/.anthropics-skills/skills/mcp-builder"
