# ─────────────────────────────────────────────────────────────────────────────
# path_forward.yaml — Skill Copy Mapping Rules
#
# Use {REPO_ROOT} as a portable placeholder for the root of this repo.
# The sync script resolves it automatically — no hardcoded paths needed.
#
# Format:
#   from    : Absolute source path (in upstream repo)
#   to      : Absolute destination path (in YOUR repo's skills/ dir)
#   enabled : Set to false to temporarily pause this forwarding rule
#
# Notes:
#   - Destination folder will be OVERWRITTEN on every sync (clean copy)
#   - Source must be a skill folder containing a SKILL.md file
#   - You can add as many rules as needed below
# ─────────────────────────────────────────────────────────────────────────────

forwards:

# everything-claude-code
  - from: "{REPO_ROOT}/.everything-claude-code/skills/pytorch-patterns"
    to:   "{REPO_ROOT}/skills/pytorch-patterns"
    enabled: true

  - from: "{REPO_ROOT}/.everything-claude-code/skills/python-patterns"
    to:   "{REPO_ROOT}/skills/python-patterns"
    enabled: true

  - from: "{REPO_ROOT}/.everything-claude-code/skills/python-testing"
    to:   "{REPO_ROOT}/skills/python-testing"
    enabled: true

# ui-ux-pro-max-skill /home/openscore/a0/usr/projects/human-skills/.ui-ux-pro-max-skill/.claude/skills/ui-ux-pro-max
  - from: "{REPO_ROOT}/.ui-ux-pro-max-skill/.claude/skills/ui-ux-pro-max"
    to: "{REPO_ROOT}/skills/ui-ux-pro-max" 
    enabled: true

  - from: "{REPO_ROOT}/.ui-ux-pro-max-skill/README.md"
    to: "{REPO_ROOT}/skills/ui-ux-pro-max"
    enabled: true


  # ── Add more forwarding rules below ───────────────────────────────────────
