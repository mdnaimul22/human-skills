# ─────────────────────────────────────────────────────────────────────────────
# automation.yaml — Sync Schedule, Git, and Logging Configuration
#
# Use {REPO_ROOT} as a portable placeholder for the root of this repo.
# The sync script resolves it automatically — no hardcoded paths needed.
# ─────────────────────────────────────────────────────────────────────────────

schedule:
  # Run once every day at this time (24-hour format HH:MM)
  # Set run_at to null to use interval_hours instead
  run_at: null

  # Fallback: if run_at is null, run every N minutes
  interval_minutes: 10

  # How often (seconds) to poll config files for hot-reload changes
  poll_interval_seconds: 60

# ── Git Configuration ─────────────────────────────────────────────────────────
git:
  auto_push: true
  branch: main

  # Commit messages schema
  commit_messages:
    # Variables: {count} = number of files, {datetime} = current time
    manual: "chore: manual update of {count} file(s) [{datetime}]"
    
    # Catch-all fallback
    catch_all: "sync: catch-all cleanup [{datetime}]"
    
    # Upstream specific templates.
    # Variables: {upstream_name} = name of the upstream, {count} = number of files, {datetime} = current time
    upstreams:
      default: "sync: auto-update from {upstream_name} [{datetime}]"
      claude-skills: "sync: core skills synced from claude-skills [{datetime}]"
      everything-claude-code: "sync: imported rules from everything-claude-code [{datetime}]"
      superpowers: "sync: superpowers repository updated [{datetime}]"
      ui-ux-pro-max-skill: "sync: ui/ux guidelines updated [{datetime}]"
      chart-visualization-skills: "sync: chart tools synced [{datetime}]"
      anthropics-skills: "sync: anthropic standards synced [{datetime}]"

# ── Logging Configuration ─────────────────────────────────────────────────────
logging:
  level: INFO   # DEBUG | INFO | WARNING | ERROR
  log_file: "{REPO_ROOT}/scripts/logs/sync.log"
