<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg">
  <defs>

    <!-- Neon green glow -->
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cyan glow -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pink glow -->
    <filter id="glow-pink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur1"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="rgba(0,255,65,0.03)"/>
    </pattern>

    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,65,0.06)" stroke-width="0.5"/>
    </pattern>

    <!-- Gradient for bg -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#050508"/>
      <stop offset="50%"  stop-color="#07090f"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>

    <!-- Neon line gradient -->
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="20%"  stop-color="#FF2079"/>
      <stop offset="50%"  stop-color="#00FFFF"/>
      <stop offset="80%"  stop-color="#FF2079"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="url(#bg-grad)"/>
  <rect width="900" height="240" fill="url(#grid)"/>
  <rect width="900" height="240" fill="url(#scanlines)"/>

  <!-- Corner brackets — top left -->
  <polyline points="10,40 10,10 40,10" fill="none" stroke="#FF2079" stroke-width="2" filter="url(#glow-pink)"/>
  <!-- Corner brackets — top right -->
  <polyline points="890,40 890,10 860,10" fill="none" stroke="#FF2079" stroke-width="2" filter="url(#glow-pink)"/>
  <!-- Corner brackets — bottom left -->
  <polyline points="10,200 10,230 40,230" fill="none" stroke="#FF2079" stroke-width="2" filter="url(#glow-pink)"/>
  <!-- Corner brackets — bottom right -->
  <polyline points="890,200 890,230 860,230" fill="none" stroke="#FF2079" stroke-width="2" filter="url(#glow-pink)"/>

  <!-- Side tick marks -->
  <line x1="0" y1="80"  x2="6"   y2="80"  stroke="#00FF41" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="120" x2="10"  y2="120" stroke="#00FF41" stroke-width="1" opacity="0.8"/>
  <line x1="0" y1="160" x2="6"   y2="160" stroke="#00FF41" stroke-width="1" opacity="0.5"/>
  <line x1="900" y1="80"  x2="894" y2="80"  stroke="#00FF41" stroke-width="1" opacity="0.5"/>
  <line x1="900" y1="120" x2="890" y2="120" stroke="#00FF41" stroke-width="1" opacity="0.8"/>
  <line x1="900" y1="160" x2="894" y2="160" stroke="#00FF41" stroke-width="1" opacity="0.5"/>

  <!-- HS monogram glyph — left accent -->
  <text x="32" y="132" font-family="monospace" font-size="11" fill="#00FF41" opacity="0.3" letter-spacing="2">01001000 01010011</text>

  <!-- Main title — shadow layer (slight offset, dimmer) -->
  <text x="452" y="122"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="62"
        font-weight="bold"
        letter-spacing="14"
        fill="#003a10"
        opacity="0.8">HUMAN SKILLS</text>

  <!-- Main title — primary neon green -->
  <text x="450" y="120"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="62"
        font-weight="bold"
        letter-spacing="14"
        fill="#00FF41"
        filter="url(#glow-green)">HUMAN SKILLS</text>

  <!-- Neon separator line -->
  <line x1="60" y1="148" x2="840" y2="148" stroke="url(#line-grad)" stroke-width="1.5" filter="url(#glow-cyan)"/>

  <!-- Tagline -->
  <text x="450" y="175"
        text-anchor="middle"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        letter-spacing="2"
        fill="#00FFFF"
        filter="url(#glow-cyan)">[ IF IT HASN'T BEEN TESTED BY A HUMAN — IT DOESN'T BELONG HERE ]</text>

  <!-- Bottom status bar -->
  <text x="32"  y="220" font-family="monospace" font-size="9" fill="#FF2079" opacity="0.7" letter-spacing="1">▶ VERIFIED</text>
  <text x="450" y="220" text-anchor="middle" font-family="monospace" font-size="9" fill="#00FF41" opacity="0.5" letter-spacing="3">· · · · · · · · · · · · · · · · · · · · ·</text>
  <text x="868" y="220" font-family="monospace" font-size="9" fill="#FF2079" opacity="0.7" letter-spacing="1">v1.0 ◀</text>

</svg>
