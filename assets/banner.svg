<svg width="900" height="160" viewBox="0 0 900 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="2" fill="#00ff88" opacity="0.04"/>
    </pattern>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lineglow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="bounds"><rect width="900" height="160"/></clipPath>
    <clipPath id="matrixclip"><rect width="900" height="160"/></clipPath>
    <style>
      @keyframes glitch2 {
        0%,92%,100% { transform:translateX(0); opacity:0; }
        93% { transform:translateX(4px); opacity:0.55; }
        96% { transform:translateX(-2px); opacity:0.35; }
        99% { transform:translateX(1px); opacity:0; }
      }
      @keyframes sawtooth {
        0%   { transform: translateX(0px)  translateY(0px); }
        5%   { transform: translateX(6px)  translateY(-3px); }
        10%  { transform: translateX(-6px) translateY(3px); }
        15%  { transform: translateX(5px)  translateY(-2px); }
        20%  { transform: translateX(-4px) translateY(2px); }
        25%  { transform: translateX(3px)  translateY(-1px); }
        30%  { transform: translateX(-2px) translateY(1px); }
        35%  { transform: translateX(1px)  translateY(0px); }
        40%  { transform: translateX(0px)  translateY(0px); }
        100% { transform: translateX(0px)  translateY(0px); }
      }
    </style>
  </defs>

  <!-- BACKGROUND -->
  <rect width="900" height="160" fill="#050d0a"/>
  <rect width="900" height="160" fill="url(#scanlines)"/>

  <!-- ===== MATRIX RAIN ===== -->
  <g clip-path="url(#matrixclip)" font-family="'Courier New',monospace" font-size="12.6" fill="#00ff88">
    <g opacity="0.55"><text x="8"   y="0"><animate attributeName="y" values="-60;220" dur="1.58s" repeatCount="indefinite" begin="0s"/>1</text><text x="8"   y="0" opacity="0.5"><animate attributeName="y" values="-74;206" dur="1.58s" repeatCount="indefinite" begin="0s"/>0</text></g>
    <g opacity="0.4"> <text x="24"  y="0"><animate attributeName="y" values="-60;220" dur="1.27s" repeatCount="indefinite" begin="0.3s"/>0</text><text x="24"  y="0" opacity="0.5"><animate attributeName="y" values="-74;206" dur="1.27s" repeatCount="indefinite" begin="0.3s"/>1</text></g>
    <g opacity="0.6"> <text x="40"  y="0"><animate attributeName="y" values="-60;220" dur="1.8s"  repeatCount="indefinite" begin="0.8s"/>1</text><text x="40"  y="0" opacity="0.45"><animate attributeName="y" values="-74;206" dur="1.8s"  repeatCount="indefinite" begin="0.8s"/>1</text></g>
    <g opacity="0.35"><text x="56"  y="0"><animate attributeName="y" values="-60;220" dur="1.42s" repeatCount="indefinite" begin="1.2s"/>0</text><text x="56"  y="0" opacity="0.5"><animate attributeName="y" values="-74;206" dur="1.42s" repeatCount="indefinite" begin="1.2s"/>0</text></g>
    <g opacity="0.5"> <text x="72"  y="0"><animate attributeName="y" values="-60;220" dur="2.03s" repeatCount="indefinite" begin="0.5s"/>1</text><text x="72"  y="0" opacity="0.4"><animate attributeName="y" values="-74;206" dur="2.03s" repeatCount="indefinite" begin="0.5s"/>0</text></g>
    <g opacity="0.45"><text x="88"  y="0"><animate attributeName="y" values="-60;220" dur="1.5s"  repeatCount="indefinite" begin="1.5s"/>0</text><text x="88"  y="0" opacity="0.5"><animate attributeName="y" values="-74;206" dur="1.5s"  repeatCount="indefinite" begin="1.5s"/>1</text></g>
    <g opacity="0.6"> <text x="104" y="0"><animate attributeName="y" values="-60;220" dur="1.72s" repeatCount="indefinite" begin="0.2s"/>1</text><text x="104" y="0" opacity="0.4"><animate attributeName="y" values="-74;206" dur="1.72s" repeatCount="indefinite" begin="0.2s"/>1</text></g>
    <g opacity="0.3"> <text x="120" y="0"><animate attributeName="y" values="-60;220" dur="1.35s" repeatCount="indefinite" begin="0.9s"/>0</text><text x="120" y="0" opacity="0.5"><animate attributeName="y" values="-74;206" dur="1.35s" repeatCount="indefinite" begin="0.9s"/>0</text></g>
    <g opacity="0.18">
      <text x="248" y="0"><animate attributeName="y" values="-60;220" dur="2.1s"  repeatCount="indefinite" begin="0.1s"/>0</text>
      <text x="264" y="0"><animate attributeName="y" values="-60;220" dur="1.27s" repeatCount="indefinite" begin="0.9s"/>1</text>
      <text x="280" y="0"><animate attributeName="y" values="-60;220" dur="1.72s" repeatCount="indefinite" begin="1.3s"/>0</text>
      <text x="440" y="0"><animate attributeName="y" values="-60;220" dur="2.1s"  repeatCount="indefinite" begin="0.8s"/>1</text>
      <text x="648" y="0"><animate attributeName="y" values="-60;220" dur="2.0s"  repeatCount="indefinite" begin="1.0s"/>0</text>
    </g>
    <g opacity="0.5"> <text x="840" y="0"><animate attributeName="y" values="-60;220" dur="2.17s" repeatCount="indefinite" begin="1.5s"/>1</text><text x="840" y="0" opacity="0.45"><animate attributeName="y" values="-74;206" dur="2.17s" repeatCount="indefinite" begin="1.5s"/>1</text></g>
    <g opacity="0.45"><text x="888" y="0"><animate attributeName="y" values="-60;220" dur="1.88s" repeatCount="indefinite" begin="1.8s"/>0</text><text x="888" y="0" opacity="0.5"><animate attributeName="y" values="-74;206" dur="1.88s" repeatCount="indefinite" begin="1.8s"/>1</text></g>
  </g>

  <!-- Grid overlay -->
  <g opacity="0.05" stroke="#00ff88" stroke-width="0.5" fill="none">
    <line x1="100" y1="0" x2="100" y2="160"/><line x1="200" y1="0" x2="200" y2="160"/>
    <line x1="300" y1="0" x2="300" y2="160"/><line x1="400" y1="0" x2="400" y2="160"/>
    <line x1="500" y1="0" x2="500" y2="160"/><line x1="600" y1="0" x2="600" y2="160"/>
    <line x1="700" y1="0" x2="700" y2="160"/><line x1="800" y1="0" x2="800" y2="160"/>
    <line x1="0" y1="40"  x2="900" y2="40"/><line x1="0" y1="80"  x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
  </g>

  <!-- ===== CIRCUIT TRACES ===== -->
  <g clip-path="url(#bounds)" filter="url(#lineglow)">
    <g stroke="#00ff88" stroke-width="1.2" fill="none" opacity="0.4">
      <path d="M0 40 L100 40 L120 60 L220 60"   stroke-dasharray="400" stroke-dashoffset="400"><animate attributeName="stroke-dashoffset" from="400" to="0" dur="1.5s" begin="0.2s" fill="freeze"/></path>
      <path d="M0 130 L90 130 L110 110 L200 110" stroke-dasharray="400" stroke-dashoffset="400"><animate attributeName="stroke-dashoffset" from="400" to="0" dur="1.6s" begin="0.3s" fill="freeze"/></path>
      <path d="M900 40 L800 40 L780 60 L680 60"  stroke-dasharray="400" stroke-dashoffset="400"><animate attributeName="stroke-dashoffset" from="400" to="0" dur="1.5s" begin="0.2s" fill="freeze"/></path>
      <path d="M900 130 L810 130 L790 110 L700 110" stroke-dasharray="400" stroke-dashoffset="400"><animate attributeName="stroke-dashoffset" from="400" to="0" dur="1.6s" begin="0.3s" fill="freeze"/></path>
    </g>
    <g fill="#00ff88">
      <circle cx="100" cy="40"  r="3" opacity="0.7"><animate attributeName="r" values="3;5;3" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="800" cy="40"  r="3" opacity="0.7"><animate attributeName="r" values="3;5;3" dur="3.2s" repeatCount="indefinite"/></circle>
    </g>
    <!-- Hexagons -->
    <g stroke="#00ff88" stroke-width="0.8" fill="none" opacity="0.3">
      <polygon points="30,20 43,12 56,20 56,36 43,44 30,36"/>
      <polygon points="870,20 883,12 896,20 896,36 883,44 870,36"/>
    </g>
  </g>

  <!-- ===== BORDER FRAME ===== -->
  <rect x="2" y="2" width="896" height="156" rx="4" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.4"/>
  <!-- Corner brackets -->
  <g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M2 28 L2 2 L28 2"/>
    <path d="M872 2 L898 2 L898 28"/>
    <path d="M2 132 L2 158 L28 158"/>
    <path d="M872 158 L898 158 L898 132"/>
  </g>
  <!-- Corner filled squares -->
  <g fill="#00ff88" opacity="0.7">
    <rect x="2" y="2" width="5" height="5"/>
    <rect x="893" y="2" width="5" height="5"/>
    <rect x="2" y="153" width="5" height="5"/>
    <rect x="893" y="153" width="5" height="5"/>
  </g>

  <!-- ===== MAIN TITLE ===== -->
  <g filter="url(#glow)">
    <text x="455" y="86" font-family="'Courier New',monospace" font-size="52" font-weight="bold" fill="#ff0044" letter-spacing="12" text-anchor="middle" opacity="0" style="animation:glitch2 7s 2s infinite;">HUMAN SKILLS</text>
    <text x="447" y="84" font-family="'Courier New',monospace" font-size="52" font-weight="bold" fill="#00ffff" letter-spacing="12" text-anchor="middle" opacity="0" style="animation:glitch2 7s 3.5s infinite;">HUMAN SKILLS</text>
    <text x="451" y="85" font-family="'Courier New',monospace" font-size="52" font-weight="bold" fill="#00ff88" letter-spacing="12" text-anchor="middle" style="animation:sawtooth 6s 1.5s infinite;">HUMAN SKILLS</text>
  </g>

  <!-- ===== DECORATIVE RULER LINES ===== -->
  <g stroke="#00ff88" stroke-width="0.5" opacity="0.2">
    <line x1="280" y1="45" x2="620" y2="45"/>
    <line x1="280" y1="110" x2="620" y2="110"/>
  </g>
  <!-- Ripple rings -->
  <circle cx="280" cy="45" r="3" fill="none" stroke="#00ff88" stroke-width="1" opacity="0">
    <animate attributeName="r" values="3;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="110" r="3" fill="none" stroke="#00ff88" stroke-width="1" opacity="0">
    <animate attributeName="r" values="3;12" dur="2s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>

  <!-- ===== TAGLINE ===== -->
  <text x="450" y="128" font-family="'Courier New',monospace" font-size="11" fill="#4ecdc4" text-anchor="middle" letter-spacing="3" filter="url(#softglow)">[ IF IT HASN'T BEEN TESTED BY A HUMAN — IT DOESN'T BELONG HERE ]</text>

  <!-- ===== BOTTOM STATUS BAR ===== -->
  <text x="20"  y="150" font-family="'Courier New',monospace" font-size="9" fill="#00ff88" opacity="0.6" letter-spacing="2">▶ VERIFIED</text>
  <text x="880" y="150" text-anchor="end" font-family="'Courier New',monospace" font-size="9" fill="#4ecdc4" opacity="0.6" letter-spacing="1">v1.0 ◀</text>

  <!-- ===== SCAN LINE ===== -->
  <g clip-path="url(#bounds)">
    <rect x="0" y="0" width="900" height="2" fill="#00ff88" opacity="0.07">
      <animateTransform attributeName="transform" type="translate" from="0,-5" to="0,165" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

</svg>
